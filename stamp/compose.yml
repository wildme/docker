name: stamp

services:
  app:
    container_name: "web_stamp"
    env_file: app.env
    build: .
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 250M
        reservations:
          cpus: "0.5"
          memory: 140M
    depends_on:
      - db
    restart: "unless-stopped"
    ports:
      - "3000:3000"
      - "3080:3080"
    volumes:
      - ${DOCKER_VOL_STAMP_FILES}:/stamp/files
      - ${DOCKER_VOL_STAMP_LOGS}:/stamp/logs
  db:
    container_name: "db_stamp"
    image: "mongo:6.0.27"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 350M
        reservations:
          cpus: "1.0"
          memory: 250M
    restart: "unless-stopped"
    ports:
      - "27017:27017"
    volumes:
      - ${DOCKER_VOL_STAMP_DB}:/data/db

